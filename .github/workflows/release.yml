name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  # ═══════════════════════════════════════════════════════════
  #  Linux x86_64
  # ═══════════════════════════════════════════════════════════
  build-linux:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tetris
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        working-directory: .
        run: |
          sudo apt-get update
          sudo apt-get install -y libglfw3-dev libglew-dev libgl-dev libopenal-dev

      - name: Build
        run: make

      - name: Package
        run: |
          mkdir -p dist
          cp neon_tetris dist/
          tar -czf neon-tetris-linux-x86_64.tar.gz -C dist neon_tetris

      - uses: actions/upload-artifact@v4
        with:
          name: neon-tetris-linux-x86_64
          path: tetris/neon-tetris-linux-x86_64.tar.gz

  # ═══════════════════════════════════════════════════════════
  #  macOS ARM64 (Apple Silicon)
  # ═══════════════════════════════════════════════════════════
  build-macos-arm64:
    runs-on: macos-14
    defaults:
      run:
        working-directory: tetris
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        working-directory: .
        run: brew install glfw glew

      - name: Build
        run: make

      - name: Package
        run: |
          mkdir -p dist
          cp neon_tetris dist/
          tar -czf neon-tetris-macos-arm64.tar.gz -C dist neon_tetris

      - uses: actions/upload-artifact@v4
        with:
          name: neon-tetris-macos-arm64
          path: tetris/neon-tetris-macos-arm64.tar.gz

  # ═══════════════════════════════════════════════════════════
  #  Windows x86_64 (MSYS2 MinGW64)
  # ═══════════════════════════════════════════════════════════
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
        working-directory: tetris
    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-glfw
            mingw-w64-x86_64-glew
            mingw-w64-x86_64-openal
            make
            p7zip

      - name: Build
        run: make

      - name: Package
        run: |
          mkdir -p dist
          cp neon_tetris.exe dist/
          # Bundle all MinGW runtime DLLs (ldd resolves transitive deps)
          MINGW_BIN="/${MSYSTEM,,}/bin"
          ldd neon_tetris.exe | grep "$MINGW_BIN" | awk '{print $3}' | while read -r dll; do
            cp "$dll" dist/
          done
          # Include the bundled OpenAL32.dll as fallback
          cp OpenAL32.dll dist/ 2>/dev/null || true
          cd dist && 7z a ../neon-tetris-windows-x86_64.zip * && cd ..

      - uses: actions/upload-artifact@v4
        with:
          name: neon-tetris-windows-x86_64
          path: tetris/neon-tetris-windows-x86_64.zip

  # ═══════════════════════════════════════════════════════════
  #  Create GitHub Release (on tag push only)
  # ═══════════════════════════════════════════════════════════
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-linux, build-macos-arm64, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/neon-tetris-linux-x86_64/neon-tetris-linux-x86_64.tar.gz
            artifacts/neon-tetris-macos-arm64/neon-tetris-macos-arm64.tar.gz
            artifacts/neon-tetris-windows-x86_64/neon-tetris-windows-x86_64.zip
